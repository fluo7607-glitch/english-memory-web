services:
  - type: web
    name: english-memory-web
    env: python
    plan: free
    autoDeploy: true
    buildCommand: ""
    startCommand: "python3 online_proxy.py"
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: OPENAI_MODEL
        value: Qwen/Qwen3.5-27B
      - key: ENHANCE_TIMEOUT
        value: "240"
      - key: ENHANCE_RETRIES
        value: "2"
      - key: OPENAI_API_KEY
        sync: false
